<body>

<!-- ===================== صفحه ورود ===================== -->
<div id="loginScreen">
  <h1>📁 سامانه مدیریت پروژه</h1>
  <p>برای دسترسی به سامانه، با حساب گوگل خود وارد شوید.</p>
  
  <!-- دکمه ورود ساده و مشخص -->
  <button id="googleLoginBtn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    ورود با گوگل
  </button>
  
  <div id="loginError"></div>
</div>

<!-- ===================== برنامه اصلی ===================== -->
<div id="app" class="hidden">
  <aside>
    <div class="brand">📁 پرونده‌های پروژه<small>مدیریت پروژه، جلسات و نامه‌ها</small></div>

      <div class="name" id="userName"></div>
      <div class="mail" id="userMail"></div>
    </div>

    <div id="projectList"></div>
    <button id="signOutBtn">🚪 خروج از حساب</button>
  </aside>
  <main>
    <div id="syncStatus"><span class="dot"></span><span id="syncText">آماده</span></div>
    <div id="mainContent"></div>
  </main>
</div>

<!-- ===================== محل قرارگیری مودال‌ها ===================== -->
<div id="modalRoot"></div>

<script>
// ================================================================
// تنظیمات
// ================================================================
const CONFIG = {
  CLIENT_ID: "https://1094486513329-4rgt63dvl9d3oqfbhe7pad3uv2s130ca.apps.googleusercontent.com",
  DRIVE_FOLDER_ID: "https://drive.google.com/drive/folders/1Fp69nrlgchqVpxdP3LsPEMaZjDAp3elC?dmr=1&ec=wgc-drive-%5Bmodule%5D-goto",
  DB_FILENAME: "pms-database.json",
  ALLOWED_EMAILS: [
    // ایمیل گوگل دقیق هر کاربر مجاز را اینجا اضافه کنید (حداکثر حدود ۱۵ نفر)
    "Applyforfund@gmail.com",
    "Arsam.Smarttech@gmail.com"
    "koroush.gheisari@gmail.com"
  ],
  SCOPES: "https://www.googleapis.com/auth/drive"
};

// ================================================================
// متغیرهای سراسری
// ================================================================
let accessToken = null;
let currentUser = null;
let db = { nextProjectNumber: 1, nextLetterNumber: 1, projects: [], meetings: [], letters: [] };
let dbFileId = null;
let activeProjectId = null;
let activeTab = 'meetings';
let tokenClient = null;

// ================================================================
// توابع کمکی
// ================================================================
const $ = (sel) => document.querySelector(sel);
const el = (tag, cls, html) => { 
  const e = document.createElement(tag); 
  if (cls) e.className = cls; 
  if (html !== undefined) e.innerHTML = html; 
  return e; 
};

function escapeHtml(str) {
  return String(str || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function formatDate(d) {
  try { return new Date(d).toLocaleDateString('fa-IR', { year: 'numeric', month: 'long', day: 'numeric' }); } 
  catch (e) { return d; }
}

function showLoginError(msg) {
  const errEl = document.getElementById('loginError');
  errEl.textContent = msg;
  errEl.style.display = 'block';
}

function setSync(text, state) {
  const s = document.getElementById('syncStatus');
  s.className = state || '';
  document.getElementById('syncText').textContent = text;
}

// ================================================================
// راه‌اندازی Google Auth - ساده و مستقیم
// ================================================================
window.onload = function() {
  console.log('✅ صفحه بارگذاری شد');
  
  // دکمه ورود
  const loginBtn = document.getElementById('googleLoginBtn');
  
  // وقتی دکمه کلیک شد، مستقیماً کتابخانه گوگل را صدا بزن
  loginBtn.addEventListener('click', function() {
    console.log('🔄 دکمه ورود کلیک شد');
    this.disabled = true;
    this.innerHTML = '⏳ در حال اتصال...';
    
    // راه‌اندازی کتابخانه گوگل در لحظه کلیک
    try {
      google.accounts.id.initialize({
        client_id: CONFIG.CLIENT_ID,
        callback: handleIdToken,
        cancel_on_tap_outside: false
      });
      
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CONFIG.CLIENT_ID,
        scope: CONFIG.SCOPES,
        callback: (resp) => {
          if (resp.error) {
            console.error('❌ خطا در دریافت توکن:', resp.error);
            showLoginError("دسترسی به گوگل‌درایو رد شد.");
            enableLoginButton();
            return;
          }
          accessToken = resp.access_token;
          bootApp();
        }
      });
      
      // نمایش پنجره انتخاب حساب
      google.accounts.id.prompt();
      
    } catch(e) {
      console.error('❌ خطا:', e);
      showLoginError('خطا در بارگذاری سرویس گوگل. لطفاً صفحه را رفرش کنید.');
      enableLoginButton();
    }
  });
  
  console.log('✅ دکمه ورود آماده است');
};

function enableLoginButton() {
  const btn = document.getElementById('googleLoginBtn');
  btn.disabled = false;
  btn.innerHTML = `
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    ورود با گوگل
  `;
}

// ================================================================
// مدیریت پاسخ ورود
// ================================================================
function handleIdToken(response) {
  console.log('🔄 دریافت پاسخ از گوگل');
  try {
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    const email = (payload.email || '').toLowerCase();
    console.log('📧 ایمیل:', email);
    
    if (!CONFIG.ALLOWED_EMAILS.map(e => e.toLowerCase()).includes(email)) {
      showLoginError("❌ این ایمیل در فهرست کاربران مجاز نیست.");
      enableLoginButton();
      return;
    }
    
    currentUser = { name: payload.name, email: payload.email };
    console.log('✅ کاربر معتبر:', currentUser.name);
    tokenClient.requestAccessToken({ prompt: '' });
    
  } catch(e) {
    console.error('❌ خطا در handleIdToken:', e);
    showLoginError('خطا در پردازش اطلاعات ورود.');
    enableLoginButton();
  }
}

// ================================================================
// راه‌اندازی برنامه بعد از ورود
// ================================================================
async function bootApp() {
  console.log('🚀 راه‌اندازی برنامه...');
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('userName').textContent = currentUser.name;
  document.getElementById('userMail').textContent = currentUser.email;
  document.getElementById('signOutBtn').onclick = () => location.reload();
  document.getElementById('newProjectBtn').onclick = openNewProjectModal;
  
  setSync('در حال بارگذاری...', 'busy');
  await loadDatabase();
  setSync('همگام با گوگل‌درایو', 'ok');
  renderProjectList();
  renderEmpty();
}

// ================================================================
// توابع گوگل درایو
// ================================================================
async function driveFetch(url, options = {}) {
  options.headers = Object.assign({}, options.headers, { 
    'Authorization': 'Bearer ' + accessToken 
  });
  const res = await fetch(url, options);
  if (!res.ok) throw new Error('Drive API error: ' + res.status);
  return res;
}

async function loadDatabase() {
  const q = encodeURIComponent(`name='${CONFIG.DB_FILENAME}' and '${CONFIG.DRIVE_FOLDER_ID}' in parents and trashed=false`);
  const listRes = await driveFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`);
  const listData = await listRes.json();
  
  if (listData.files && listData.files.length > 0) {
    dbFileId = listData.files[0].id;
    const fileRes = await driveFetch(`https://www.googleapis.com/drive/v3/files/${dbFileId}?alt=media`);
    db = await fileRes.json();
  } else {
    dbFileId = await createDbFile();
  }
}

async function createDbFile() {
  const metadata = { 
    name: CONFIG.DB_FILENAME, 
    parents: [CONFIG.DRIVE_FOLDER_ID], 
    mimeType: 'application/json' 
  };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
  form.append('file', new Blob([JSON.stringify(db)], { type: 'application/json' }));
  const res = await driveFetch(
    'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', 
    { method: 'POST', body: form }
  );
  const data = await res.json();
  return data.id;
}

async function saveDatabase() {
  setSync('در حال ذخیره...', 'busy');
  await driveFetch(
    `https://www.googleapis.com/upload/drive/v3/files/${dbFileId}?uploadType=media`,
    {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(db)
    }
  );
  setSync('همگام با گوگل‌درایو', 'ok');
}

async function uploadAttachment(file, customName = null) {
  const fileName = customName || file.name;
  const metadata = { name: fileName, parents: [CONFIG.DRIVE_FOLDER_ID] };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
  form.append('file', file);
  const res = await driveFetch(
    'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink',
    { method: 'POST', body: form }
  );
  return await res.json();
}

// ================================================================
// توابع مدیریت پروژه‌ها
// ================================================================
function renderProjectList() {
  const wrap = document.getElementById('projectList');
  wrap.innerHTML = '';
  
  db.projects.slice().sort((a, b) => a.number - b.number).forEach(p => {
    const item = el('div', 'proj-item' + (p.id === activeProjectId ? ' active' : ''));
    item.innerHTML = `
      <span class="proj-num">#${p.number}</span>
      <span class="proj-name">${escapeHtml(p.name)}</span>
      <button class="proj-delete" style="background:transparent;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:14px;">✕</button>
    `;
    item.onclick = (e) => {
      if (e.target.classList.contains('proj-delete')) return;
      activeProjectId = p.id;
      renderProjectList();
      renderProject(p.id);
    };
    item.querySelector('.proj-delete').onclick = async (e) => {
      e.stopPropagation();
      if (!confirm(`حذف پروژه "${p.name}"؟`)) return;
      db.projects = db.projects.filter(pr => pr.id !== p.id);
      db.meetings = db.meetings.filter(m => m.projectId !== p.id);
      db.letters = db.letters.filter(l => l.projectId !== p.id);
      if (activeProjectId === p.id) { activeProjectId = null; renderEmpty(); }
      await saveDatabase();
      renderProjectList();
    };
    wrap.appendChild(item);
  });
}

function renderEmpty() {
  document.getElementById('mainContent').innerHTML = `
    <div class="empty-state">
      <b>📂 هیچ پروژه‌ای انتخاب نشده</b>
      از فهرست سمت راست یک پروژه را انتخاب کنید.
    </div>`;
}

function openNewProjectModal() {
  const overlay = el('div', 'modal-overlay');
  overlay.innerHTML = `
    <div class="modal">
      <h3>📄 پروژه جدید — شماره #${db.nextProjectNumber}</h3>
      <div class="field">
        <label>نام پروژه</label>
        <input type="text" id="npName" placeholder="نام پروژه را وارد کنید">
      </div>
      <div class="field">
        <label>توضیح (اختیاری)</label>
        <textarea id="npDesc" placeholder="توضیحات پروژه..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn secondary" id="npCancel">انصراف</button>
        <button class="btn" id="npSave">ثبت پروژه</button>
      </div>
    </div>
  `;
  document.getElementById('modalRoot').appendChild(overlay);
  
  overlay.querySelector('#npCancel').onclick = () => overlay.remove();
  overlay.querySelector('#npSave').onclick = async () => {
    const name = overlay.querySelector('#npName').value.trim();
    if (!name) { alert('لطفاً نام پروژه را وارد کنید.'); return; }
    
    const proj = {
      id: 'p_' + Date.now(),
      number: db.nextProjectNumber,
      name: name,
      description: overlay.querySelector('#npDesc').value.trim(),
      createdBy: currentUser.email,
      createdAt: new Date().toISOString()
    };
    db.projects.push(proj);
    db.nextProjectNumber++;
    overlay.remove();
    await saveDatabase();
    renderProjectList();
    activeProjectId = proj.id;
    renderProjectList();
    renderProject(proj.id);
  };
}

// ================================================================
// توابع نمایش پروژه، جلسات و نامه‌ها
// ================================================================
function renderProject(projectId) {
  const p = db.projects.find(x => x.id === projectId);
  if (!p) { renderEmpty(); return; }
  
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="project-header">
      <div>
        <div class="file-tag">پرونده شماره #${p.number}</div>
        <h2>${escapeHtml(p.name)}</h2>
        ${p.description ? `<div class="desc" style="color:#6B7280;font-size:14px;">${escapeHtml(p.description)}</div>` : ''}
        <div style="font-size:12px;color:#6B7280;margin-top:6px;">ایجاد: ${new Date(p.createdAt).toLocaleDateString('fa-IR')}</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn accent" id="newMeetingBtn">➕ جلسه جدید</button>
        <button class="btn" id="newLetterBtn">✉️ نامه جدید</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="meetings">📋 جلسات</button>
      <button class="tab" data-tab="letters">✉️ نامه‌ها</button>
    </div>
    <div id="tab-meetings" class="tab-content active"><div class="timeline" id="timeline"></div></div>
    <div id="tab-letters" class="tab-content"><div id="letterList"></div></div>
  `;
  
  // تب‌ها
  main.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
      main.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const tabName = tab.dataset.tab;
      main.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
      main.querySelector(`#tab-${tabName}`).classList.add('active');
      if (tabName === 'meetings') renderMeetings(projectId);
      else renderLetters(projectId);
    };
  });
  
  document.getElementById('newMeetingBtn').onclick = () => openNewMeetingModal(projectId);
  document.getElementById('newLetterBtn').onclick = () => openNewLetterModal(projectId);
  
  renderMeetings(projectId);
  renderLetters(projectId);
}

function renderMeetings(projectId) {
  const meetings = db.meetings.filter(m => m.projectId === projectId).sort((a, b) => new Date(b.date) - new Date(a.date));
  const tl = document.getElementById('timeline');
  if (!tl) return;
  
  if (meetings.length === 0) {
    tl.innerHTML = `<div class="empty-state" style="margin-top:40px;"><b>📋 هنوز جلسه‌ای ثبت نشده</b></div>`;
    return;
  }
  
  tl.innerHTML = '';
  meetings.forEach(m => {
    const card = el('div', 'meeting-card');
    const followupsHtml = (m.followUps || []).length ? 
      `<div style="margin:10px 0 6px;font-weight:700;color:#6B7280;font-size:12px;">📌 پیگیری‌ها</div><ul style="padding-right:20px;line-height:2.2;">${m.followUps.map(f => `<li>${escapeHtml(f)}</li>`).join('')}</ul>` : '';
    const attachHtml = (m.attachments || []).length ?
      `<div style="margin:10px 0 6px;font-weight:700;color:#6B7280;font-size:12px;">📎 پیوست‌ها</div><div class="attach-list">${m.attachments.map(a => `<a class="attach-chip" target="_blank" href="${a.link}">📎 ${escapeHtml(a.name)}</a>`).join('')}</div>` : '';
    const commentsHtml = (m.comments || []).map(c => `
      <div class="comment"><div class="meta">${escapeHtml(c.user)} · ${new Date(c.date).toLocaleString('fa-IR')}</div>${escapeHtml(c.text)}</div>
    `).join('');
    
    card.innerHTML = `
      <div class="meeting-top" style="display:flex;justify-content:space-between;">
        <div>
          <div class="meeting-date">📅 ${formatDate(m.date)}</div>
          <div class="meeting-title">${escapeHtml(m.title)}</div>
        </div>
      </div>
      <div class="meeting-summary">${escapeHtml(m.summary)}</div>
      ${followupsHtml}
      ${attachHtml}
      <div class="comments">
        <div style="font-weight:700;color:#6B7280;font-size:12px;margin-bottom:8px;">💬 کامنت‌ها</div>
        ${commentsHtml || '<div style="font-size:13px;color:#6B7280;">هنوز کامنتی ثبت نشده</div>'}
        <div class="comment-form">
          <input type="text" placeholder="نوشتن کامنت..." class="commentInput">
          <button class="btn small commentSendBtn">ارسال</button>
        </div>
      </div>
    `;
    
    card.querySelector('.commentSendBtn').onclick = async () => {
      const input = card.querySelector('.commentInput');
      const text = input.value.trim();
      if (!text) return;
      m.comments = m.comments || [];
      m.comments.push({ user: currentUser.name, text, date: new Date().toISOString() });
      await saveDatabase();
      renderProject(m.projectId);
    };
    tl.appendChild(card);
  });
}

function renderLetters(projectId) {
  const letters = db.letters.filter(l => l.projectId === projectId).sort((a, b) => b.number - a.number);
  const wrap = document.getElementById('letterList');
  if (!wrap) return;
  
  if (letters.length === 0) {
    wrap.innerHTML = `<div class="empty-state" style="margin-top:40px;"><b>✉️ هنوز نامه‌ای ثبت نشده</b></div>`;
    return;
  }
  
  wrap.innerHTML = '';
  letters.forEach(l => {
    const card = el('div', 'letter-card');
    const attachHtml = (l.attachments || []).length ?
      `<div style="margin:10px 0 6px;font-weight:700;color:#6B7280;font-size:12px;">📎 پیوست‌ها</div><div class="attach-list">${l.attachments.map(a => `<a class="attach-chip" target="_blank" href="${a.link}">📎 ${escapeHtml(a.name)}</a>`).join('')}</div>` : '';
    
    card.innerHTML = `
      <div class="letter-top" style="display:flex;justify-content:space-between;">
        <div>
          <span class="letter-number">✉️ شماره: ${l.number}</span>
          <div class="letter-title">${escapeHtml(l.title)}</div>
          <div class="letter-meta">${formatDate(l.date)} · ${escapeHtml(l.sender)} → ${escapeHtml(l.recipient)}</div>
        </div>
      </div>
      ${l.summary ? `<div class="letter-summary">${escapeHtml(l.summary)}</div>` : ''}
      ${attachHtml}
      <div style="font-size:12px;color:#6B7280;margin-top:8px;">ثبت: ${escapeHtml(l.createdBy)}</div>
    `;
    wrap.appendChild(card);
  });
}

// ================================================================
// مودال‌های جلسه و نامه
// ================================================================
function openNewMeetingModal(projectId) {
  const overlay = el('div', 'modal-overlay');
  overlay.innerHTML = `
    <div class="modal">
      <h3>📝 ثبت جلسه جدید</h3>
      <div class="field"><label>عنوان جلسه</label><input type="text" id="mTitle" placeholder="عنوان جلسه"></div>
      <div class="field"><label>تاریخ</label><input type="date" id="mDate" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="field"><label>خلاصه جلسه</label><textarea id="mSummary" placeholder="خلاصه جلسه..."></textarea></div>
      <div class="field">
        <label>پیگیری‌ها</label>
        <div id="followupRows"></div>
        <button type="button" class="btn secondary small" id="addFollowupBtn">➕ افزودن</button>
      </div>
      <div class="field">
        <label>پیوست</label>
        <input type="file" id="mFiles" multiple>
        <div id="uploadProgress"></div>
      </div>
      <div class="modal-actions">
        <button class="btn secondary" id="mCancel">انصراف</button>
        <button class="btn" id="mSave">ثبت جلسه</button>
      </div>
    </div>
  `;
  document.getElementById('modalRoot').appendChild(overlay);
  
  const addRow = () => {
    const row = el('div', 'followup-row');
    row.innerHTML = `<input type="text" placeholder="مورد پیگیری..."><button type="button" class="removeRow">✕</button>`;
    row.querySelector('.removeRow').onclick = () => row.remove();
    overlay.querySelector('#followupRows').appendChild(row);
  };
  overlay.querySelector('#addFollowupBtn').onclick = addRow;
  addRow();
  
  overlay.querySelector('#mCancel').onclick = () => overlay.remove();
  overlay.querySelector('#mSave').onclick = async () => {
    const title = overlay.querySelector('#mTitle').value.trim();
    const date = overlay.querySelector('#mDate').value;
    const summary = overlay.querySelector('#mSummary').value.trim();
    if (!title || !date || !summary) { alert('لطفاً تمام فیلدها را پر کنید.'); return; }
    
    const followUps = Array.from(overlay.querySelectorAll('#followupRows input')).map(i => i.value.trim()).filter(Boolean);
    const files = Array.from(overlay.querySelector('#mFiles').files);
    
    const saveBtn = overlay.querySelector('#mSave');
    saveBtn.disabled = true;
    saveBtn.textContent = 'در حال ثبت...';
    
    const attachments = [];
    for (let i = 0; i < files.length; i++) {
      overlay.querySelector('#uploadProgress').textContent = `📤 بارگذاری ${i+1}/${files.length}...`;
      const up = await uploadAttachment(files[i]);
      attachments.push({ name: files[i].name, fileId: up.id, link: up.webViewLink });
    }
    
    const meeting = {
      id: 'm_' + Date.now(),
      projectId, title, date, summary, followUps, attachments,
      comments: [],
      createdBy: currentUser.email,
      createdAt: new Date().toISOString()
    };
    db.meetings.push(meeting);
    overlay.remove();
    await saveDatabase();
    renderProject(projectId);
  };
}

function openNewLetterModal(projectId) {
  const overlay = el('div', 'modal-overlay');
  const nextNum = db.nextLetterNumber;
  overlay.innerHTML = `
    <div class="modal">
      <h3>✉️ ثبت نامه جدید — شماره: ${nextNum}</h3>
      <div class="field"><label>عنوان نامه</label><input type="text" id="lTitle" placeholder="موضوع نامه"></div>
      <div class="field"><label>تاریخ</label><input type="date" id="lDate" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="field"><label>فرستنده</label><input type="text" id="lSender" placeholder="نام فرستنده"></div>
      <div class="field"><label>گیرنده</label><input type="text" id="lRecipient" placeholder="نام گیرنده"></div>
      <div class="field"><label>خلاصه (اختیاری)</label><textarea id="lSummary" placeholder="خلاصه نامه..."></textarea></div>
      <div class="field">
        <label>پیوست</label>
        <input type="file" id="lFiles" multiple>
        <div id="uploadProgress"></div>
      </div>
      <div class="modal-actions">
        <button class="btn secondary" id="lCancel">انصراف</button>
        <button class="btn" id="lSave">ثبت نامه</button>
      </div>
    </div>
  `;
  document.getElementById('modalRoot').appendChild(overlay);
  
  overlay.querySelector('#lCancel').onclick = () => overlay.remove();
  overlay.querySelector('#lSave').onclick = async () => {
    const title = overlay.querySelector('#lTitle').value.trim();
    const date = overlay.querySelector('#lDate').value;
    const sender = overlay.querySelector('#lSender').value.trim();
    const recipient = overlay.querySelector('#lRecipient').value.trim();
    if (!title || !date || !sender || !recipient) {
      alert('لطفاً عنوان، تاریخ، فرستنده و گیرنده را وارد کنید.');
      return;
    }
    
    const files = Array.from(overlay.querySelector('#lFiles').files);
    const saveBtn = overlay.querySelector('#lSave');
    saveBtn.disabled = true;
    saveBtn.textContent = 'در حال ثبت...';
    
    const attachments = [];
    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      const customName = `نامه_${nextNum}_${title.replace(/\s+/g,'_')}_${file.name}`;
      overlay.querySelector('#uploadProgress').textContent = `📤 بارگذاری ${customName}...`;
      const up = await uploadAttachment(file, customName);
      attachments.push({ name: customName, fileId: up.id, link: up.webViewLink });
    }
    
    const letter = {
      id: 'l_' + Date.now(),
      number: nextNum,
      projectId, title, date, sender, recipient,
      summary: overlay.querySelector('#lSummary').value.trim(),
      attachments,
      createdBy: currentUser.email,
      createdAt: new Date().toISOString()
    };
    db.letters.push(letter);
    db.nextLetterNumber++;
    overlay.remove();
    await saveDatabase();
    renderProject(projectId);
  };
}
</script>
