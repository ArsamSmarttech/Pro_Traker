function escapeHtml(str){ return String(str||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function formatDate(d){ try{ return new Date(d).toLocaleDateString('fa-IR',{year:'numeric',month:'long',day:'numeric'}); }catch(e){ return d; } }

function formatDateTime(d){ try{ return new Date(d).toLocaleString('fa-IR'); }catch(e){ return d; } }

// ================================================================
// GOOGLE DRIVE CONNECTION
// ================================================================
async function initializeDriveConnection() {
  const savedToken = localStorage.getItem('drive_token');
  if(savedToken) {
    accessToken = savedToken;
    try {
      await testToken();
      await loadDatabase();
      return;
    } catch(e) {
      console.log('⚠️ توکن منقضی شده، درخواست جدید...');
      localStorage.removeItem('drive_token');
      accessToken = null;
    }
  }
  
  await requestNewToken();
  await loadDatabase();
  
  if(tokenRefreshInterval) clearInterval(tokenRefreshInterval);
  tokenRefreshInterval = setInterval(() => {
    console.log('🔄 رفرش توکن در پس‌زمینه...');
    requestNewToken().catch(e => console.error('❌ خطا در رفرش توکن:', e));
  }, 50 * 60 * 1000);
}

async function requestNewToken() {
  return new Promise((resolve, reject) => {
    updateDriveStatus('درخواست مجوز با ' + CONFIG.DRIVE_EMAIL + '...', false);
    
    const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
      `client_id=${CONFIG.CLIENT_ID}&` +
      `redirect_uri=${encodeURIComponent(window.location.origin + window.location.pathname)}&` +
      `response_type=token&` +
      `scope=https://www.googleapis.com/auth/drive&` +
      `login_hint=${encodeURIComponent(CONFIG.DRIVE_EMAIL)}&` +
      `prompt=consent`;
    
    const win = window.open(authUrl, '_blank', 'width=500,height=600');
    if(!win) {
      reject(new Error('پنجره باز نشد. لطفاً pop-up را فعال کنید.'));
      return;
    }
    
    let resolved = false;
    const checkInterval = setInterval(() => {
      try {
        if(win.closed) {
          clearInterval(checkInterval);
          if(!resolved) {
            reject(new Error('پنجره بسته شد. لطفاً دوباره تلاش کنید.'));
          }
          return;
        }
        
        const token = localStorage.getItem('drive_token');
        if(token) {
          accessToken = token;
          resolved = true;
          clearInterval(checkInterval);
          win.close();
          updateDriveStatus('✅ متصل', true);
          resolve(token);
        }
      } catch(e) {}
    }, 1000);
    
    setTimeout(() => {
      if(!resolved) {
        clearInterval(checkInterval);
        if(!win.closed) win.close();
        reject(new Error('زمان اتصال به درایو به پایان رسید.'));
      }
    }, 120000);
  });
}

async function testToken() {
  const res = await fetch('https://www.googleapis.com/drive/v3/about?fields=user', {
    headers: { 'Authorization': 'Bearer ' + accessToken }
  });
  if(!res.ok) throw new Error('توکن نامعتبر');
  return true;
}

async function driveFetch(url, options={}) {
  if(!accessToken) {
    await requestNewToken();
    if(!accessToken) throw new Error('دسترسی به درایو وجود ندارد');
  }
  
  options.headers = Object.assign({}, options.headers, { 
    'Authorization': 'Bearer ' + accessToken 
  });
  
  let res = await fetch(url, options);
  if(res.status === 401) {
    accessToken = null;
    localStorage.removeItem('drive_token');
    await requestNewToken();
    options.headers['Authorization'] = 'Bearer ' + accessToken;
    res = await fetch(url, options);
  }
  
  if(!res.ok) {
    const errorText = await res.text();
    throw new Error(`خطا ${res.status}: ${errorText.substring(0, 100)}`);
  }
  return res;
}

// ================================================================
// DATABASE
// ================================================================
async function loadDatabase() {
  try {
    const q = encodeURIComponent(`name='${CONFIG.DB_FILENAME}' and '${CONFIG.DRIVE_FOLDER_ID}' in parents and trashed=false`);
    const list = await driveFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`);
    const data = await list.json();
    
    if(data.files && data.files.length > 0) {
      dbFileId = data.files[0].id;
      const file = await driveFetch(`https://www.googleapis.com/drive/v3/files/${dbFileId}?alt=media`);
      db = await file.json();
      console.log('✅ دیتابیس از درایو بارگذاری شد');
    } else {
      dbFileId = await createDbFile();
      console.log('✅ فایل دیتابیس جدید در درایو ایجاد شد');
    }
  } catch(e) {
    console.error('❌ خطا در بارگذاری دیتابیس:', e);
    const backup = localStorage.getItem('pms_db_backup');
    if(backup) {
      db = JSON.parse(backup);
      console.log('⚠️ استفاده از بکاپ محلی');
    } else {
      throw e;
    }
  }
}

async function createDbFile() {
  const meta = { 
    name: CONFIG.DB_FILENAME, 
    parents: [CONFIG.DRIVE_FOLDER_ID], 
    mimeType: 'application/json' 
  };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(meta)], {type:'application/json'}));
  form.append('file', new Blob([JSON.stringify(db)], {type:'application/json'}));
  const res = await driveFetch(
    'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', 
    { method:'POST', body:form }
  );
  const data = await res.json();
  return data.id;
}

async function saveDatabase() {
  if(isSaving) return;
  isSaving = true;
  try {
    setSync('در حال ذخیره در درایو...', 'busy');
    await driveFetch(`https://www.googleapis.com/upload/drive/v3/files/${dbFileId}?uploadType=media`, {
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(db)
    });
    localStorage.setItem('pms_db_backup', JSON.stringify(db));
    setSync('همگام با گوگل‌درایو ✅', 'ok');
    console.log('✅ دیتابیس در درایو ذخیره شد');
  } catch(e) {
    console.error('❌ خطا در ذخیره:', e);
    setSync('خطا در ذخیره', '');
    localStorage.setItem('pms_db_backup', JSON.stringify(db));
  }
  isSaving = false;
}

async function uploadAttachment(file, customName=null) {
  const fileName = customName || file.name;
  const meta = { 
    name: fileName, 
    parents: [CONFIG.DRIVE_FOLDER_ID] 
  };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(meta)], {type:'application/json'}));
  form.append('file', file);
  const res = await driveFetch(
    'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink', 
    { method:'POST', body:form }
  );
  return await res.json();
}

// ================================================================
// PROJECTS, MEETINGS, LETTERS - کدهای قبلی
// ================================================================
function renderProjectList(){
  const wrap = $('#projectList');
  wrap.innerHTML = '';
  db.projects.slice().sort((a,b)=>a.number-b.number).forEach(p=>{
    const item = el('div', 'proj-item' + (p.id===activeProjectId?' active':''));
    item.innerHTML = `<span class="proj-num">#${p.number}</span><span class="proj-name">${escapeHtml(p.name)}</span><button class="proj-delete">✕</button>`;
    item.onclick = (e) => { if(e.target.classList.contains('proj-delete')) return; activeProjectId=p.id; renderProjectList(); renderProject(p.id); };
    item.querySelector('.proj-delete').onclick = async (e) => {
      e.stopPropagation();
      if(!confirm(`حذف پروژه "${p.name}"؟`)) return;
      db.projects = db.projects.filter(pr=>pr.id!==p.id);
      db.meetings = db.meetings.filter(m=>m.projectId!==p.id);
      db.letters = db.letters.filter(l=>l.projectId!==p.id);
      if(activeProjectId===p.id){ activeProjectId=null; renderEmpty(); }
      await saveDatabase();
      renderProjectList();
    };
    wrap.appendChild(item);
  });
}

function renderEmpty(){ $('#mainContent').innerHTML = `<div class="empty-state"><b>📂 هیچ پروژه‌ای انتخاب نشده</b>از فهرست سمت راست انتخاب کنید یا پروژه جدید بسازید.</div>`; }

function openNewProjectModal(){
  const overlay = el('div','modal-overlay');
  overlay.innerHTML = `
    <div class="modal">
      <h3>📄 پروژه جدید — شماره #${db.nextProjectNumber}</h3>
      <div class="field"><label>نام پروژه</label><input type="text" id="npName" placeholder="نام پروژه را وارد کنید"></div>
      <div class="field"><label>توضیح (اختیاری)</label><textarea id="npDesc" placeholder="توضیحات پروژه..."></textarea></div>
      <div class="modal-actions"><button class="btn secondary" id="npCancel">انصراف</button><button class="btn" id="npSave">ثبت پروژه</button></div>
    </div>`;
  $('#modalRoot').appendChild(overlay);
  overlay.querySelector('#npCancel').onclick = ()=>overlay.remove();
  overlay.querySelector('#npSave').onclick = async ()=>{
    const name = overlay.querySelector('#npName').value.trim();
    if(!name){ alert('لطفاً نام پروژه را وارد کنید.'); return; }
    const proj = { id:'p_'+Date.now(), number:db.nextProjectNumber, name, description:overlay.querySelector('#npDesc').value.trim(), createdBy:currentUser.email, createdAt:new Date().toISOString() };
    db.projects.push(proj);
    db.nextProjectNumber++;
    overlay.remove();
    await saveDatabase();
    renderProjectList();
    activeProjectId=proj.id;
    renderProjectList();
    renderProject(proj.id);
  };
}

function renderProject(projectId){
  const p = db.projects.find(x=>x.id===projectId);
  if(!p){ renderEmpty(); return; }
  const main = $('#mainContent');
  main.innerHTML = `
    <div class="project-header">
      <div><div class="file-tag">پرونده شماره #${p.number}</div><h2>${escapeHtml(p.name)}</h2>${p.description?`<div class="desc">${escapeHtml(p.description)}</div>`:''}<div style="font-size:11px;color:#6B7280;margin-top:4px;">ایجاد: ${new Date(p.createdAt).toLocaleDateString('fa-IR')}</div></div>
      <div class="header-actions"><button class="btn accent" id="newMeetingBtn">➕ جلسه</button><button class="btn" id="newLetterBtn">✉️ نامه</button></div>
    </div>
    <div class="tabs"><button class="tab active" data-tab="meetings">📋 جلسات</button><button class="tab" data-tab="letters">✉️ نامه‌ها</button></div>
    <div id="tab-meetings" class="tab-content active"><div class="timeline" id="timeline"></div></div>
    <div id="tab-letters" class="tab-content"><div id="letterList"></div></div>
  `;
  main.querySelectorAll('.tab').forEach(tab=>{
    tab.onclick = ()=>{
      main.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      const tn = tab.dataset.tab;
      main.querySelectorAll('.tab-content').forEach(tc=>tc.classList.remove('active'));
      main.querySelector(`#tab-${tn}`).classList.add('active');
      if(tn==='meetings') renderMeetings(projectId);
      else renderLetters(projectId);
    };
  });
  $('#newMeetingBtn').onclick = ()=>openNewMeetingModal(projectId);
  $('#newLetterBtn').onclick = ()=>openNewLetterModal(projectId);
  renderMeetings(projectId);
  renderLetters(projectId);
}

function renderMeetings(projectId){
  const meetings = db.meetings.filter(m=>m.projectId===projectId).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const tl = $('#timeline');
  if(!tl) return;
  if(meetings.length===0){ tl.innerHTML='<div class="empty-state" style="margin-top:30px;"><b>📋 هنوز جلسه‌ای ثبت نشده</b></div>'; return; }
  tl.innerHTML = '';
  meetings.forEach(m=>{
    const card = el('div','meeting-card');
    const followups = (m.followUps||[]).length ? `<div style="margin:8px 0 4px;font-weight:700;color:#6B7280;font-size:11px;">📌 پیگیری‌ها</div><ul style="padding-right:18px;line-height:2;">${m.followUps.map(f=>`<li>${escapeHtml(f)}</li>`).join('')}</ul>` : '';
    const attaches = (m.attachments||[]).length ? `<div style="margin:8px 0 4px;font-weight:700;color:#6B7280;font-size:11px;">📎 پیوست‌ها</div><div class="attach-list">${m.attachments.map(a=>`<a class="attach-chip" target="_blank" href="${a.link}">📎 ${escapeHtml(a.name)}</a>`).join('')}</div>` : '';
    const comments = (m.comments||[]).map(c=>`<div class="comment"><div class="meta">${escapeHtml(c.user)} · ${formatDateTime(c.date)}</div>${escapeHtml(c.text)}</div>`).join('');
    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;">
        <div><div class="meeting-date">📅 ${formatDate(m.date)}</div><div class="meeting-title">${escapeHtml(m.title)}</div></div>
      </div>
      <div class="meeting-summary">${escapeHtml(m.summary)}</div>
      ${followups}${attaches}
      <div class="comments">
        <div style="font-weight:700;color:#6B7280;font-size:11px;margin-bottom:6px;">💬 کامنت‌ها</div>
        ${comments||'<div style="font-size:12px;color:#6B7280;">هنوز کامنتی ثبت نشده</div>'}
        <div class="comment-form"><input type="text" placeholder="نوشتن کامنت..." class="commentInput"><button class="btn small commentSendBtn">ارسال</button></div>
      </div>
    `;
    card.querySelector('.commentSendBtn').onclick = async ()=>{
      const input = card.querySelector('.commentInput');
      const text = input.value.trim();
      if(!text) return;
      m.comments = m.comments||[];
      m.comments.push({ user: currentUser.name, text, date: new Date().toISOString() });
      await saveDatabase();
      renderProject(m.projectId);
    };
    tl.appendChild(card);
  });
}

function renderLetters(projectId){
  const letters = db.letters.filter(l=>l.projectId===projectId).sort((a,b)=>b.number-a.number);
  const wrap = $('#letterList');
  if(!wrap) return;
  if(letters.length===0){ wrap.innerHTML='<div class="empty-state" style="margin-top:30px;"><b>✉️ هنوز نامه‌ای ثبت نشده</b></div>'; return; }
  wrap.innerHTML='';
  letters.forEach(l=>{
    const card = el('div','letter-card');
    const attaches = (l.attachments||[]).length ? `<div style="margin:8px 0 4px;font-weight:700;color:#6B7280;font-size:11px;">📎 پیوست‌ها</div><div class="attach-list">${l.attachments.map(a=>`<a class="attach-chip" target="_blank" href="${a.link}">📎 ${escapeHtml(a.name)}</a>`).join('')}</div>` : '';
    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;">
        <div><span class="letter-number">✉️ شماره: ${l.number}</span><div class="letter-title">${escapeHtml(l.title)}</div><div class="letter-meta">${formatDate(l.date)} · ${escapeHtml(l.sender)} → ${escapeHtml(l.recipient)}</div></div>
      </div>
      ${l.summary?`<div class="letter-summary">${escapeHtml(l.summary)}</div>`:''}
      ${attaches}
      <div style="font-size:11px;color:#6B7280;margin-top:6px;">ثبت: ${escapeHtml(l.createdBy)} · ${formatDateTime(l.createdAt)}</div>
    `;
    wrap.appendChild(card);
  });
}

    <div class="modal">
      <h3>📝 ثبت جلسه جدید</h3>
      <div class="field"><label>عنوان جلسه</label><input type="text" id="mTitle" placeholder="عنوان جلسه"></div>
      <div class="field"><label>تاریخ</label><input type="date" id="mDate" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="field"><label>خلاصه جلسه</label><textarea id="mSummary" placeholder="خلاصه جلسه..."></textarea></div>
      <div class="field"><label>پیگیری‌ها</label><div id="followupRows"></div><button type="button" class="btn secondary small" id="addFollowupBtn">➕ افزودن</button></div>
      <div class="field"><label>پیوست</label><input type="file" id="mFiles" multiple><div id="uploadProgress"></div></div>
      <div class="modal-actions"><button class="btn secondary" id="mCancel">انصراف</button><button class="btn" id="mSave">ثبت جلسه</button></div>
    </div>`;
  $('#modalRoot').appendChild(overlay);
  const addRow = ()=>{ const r=el('div','followup-row'); r.innerHTML='<input type="text" placeholder="مورد پیگیری..."><button type="button" class="removeRow">✕</button>'; r.querySelector('.removeRow').onclick=()=>r.remove(); overlay.querySelector('#followupRows').appendChild(r); };
  overlay.querySelector('#addFollowupBtn').onclick = addRow;
  addRow();
  overlay.querySelector('#mCancel').onclick = ()=>overlay.remove();
  overlay.querySelector('#mSave').onclick = async ()=>{
    const title = overlay.querySelector('#mTitle').value.trim();
    const date = overlay.querySelector('#mDate').value;
    const summary = overlay.querySelector('#mSummary').value.trim();
    if(!title||!date||!summary){ alert('لطفاً تمام فیلدها را پر کنید.'); return; }
    const followUps = Array.from(overlay.querySelectorAll('#followupRows input')).map(i=>i.value.trim()).filter(Boolean);
    const files = Array.from(overlay.querySelector('#mFiles').files);
    const saveBtn = overlay.querySelector('#mSave');
    saveBtn.disabled = true; saveBtn.textContent = 'در حال ثبت...';
    const attachments = [];
    for(let i=0;i<files.length;i++){
      overlay.querySelector('#uploadProgress').textContent = `📤 بارگذاری ${i+1}/${files.length}...`;
      try{ const up = await uploadAttachment(files[i]); attachments.push({ name: files[i].name, fileId: up.id, link: up.webViewLink }); }catch(e){ console.error(e); }
    }
    const meeting = { id:'m_'+Date.now(), projectId, title, date, summary, followUps, attachments, comments: [], createdBy: currentUser.email, createdAt: new Date().toISOString() };
    db.meetings.push(meeting);
    overlay.remove();
    await saveDatabase();
    renderProject(projectId);
  };
}

function openNewLetterModal(projectId){
  const overlay = el('div','modal-overlay');
  const nextNum = db.nextLetterNumber;
  overlay.innerHTML = `
    <div class="modal">
      <h3>✉️ ثبت نامه جدید — شماره: ${nextNum}</h3>
      <div class="field"><label>عنوان نامه</label><input type="text" id="lTitle" placeholder="موضوع نامه"></div>
      <div class="field"><label>تاریخ</label><input type="date" id="lDate" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="field"><label>فرستنده</label><input type="text" id="lSender" placeholder="نام فرستنده"></div>
      <div class="field"><label>گیرنده</label><input type="text" id="lRecipient" placeholder="نام گیرنده"></div>
      <div class="field"><label>خلاصه (اختیاری)</label><textarea id="lSummary" placeholder="خلاصه نامه..."></textarea></div>
      <div class="field"><label>پیوست</label><input type="file" id="lFiles" multiple><div id="uploadProgress"></div></div>
      <div class="modal-actions"><button class="btn secondary" id="lCancel">انصراف</button><button class="btn" id="lSave">ثبت نامه</button></div>
    </div>`;
  $('#modalRoot').appendChild(overlay);
  overlay.querySelector('#lCancel').onclick = ()=>overlay.remove();
  overlay.querySelector('#lSave').onclick = async ()=>{
    const title = overlay.querySelector('#lTitle').value.trim();
    const date = overlay.querySelector('#lDate').value;
    const sender = overlay.querySelector('#lSender').value.trim();
    const recipient = overlay.querySelector('#lRecipient').value.trim();
    if(!title||!date||!sender||!recipient){ alert('لطفاً عنوان، تاریخ، فرستنده و گیرنده را وارد کنید.'); return; }
    const files = Array.from(overlay.querySelector('#lFiles').files);
    const saveBtn = overlay.querySelector('#lSave');
    saveBtn.disabled = true; saveBtn.textContent = 'در حال ثبت...';
    const attachments = [];
    for(let i=0;i<files.length;i++){
      const file = files[i];
      const customName = `نامه_${nextNum}_${title.replace(/\s+/g,'_')}_${file.name}`;
      overlay.querySelector('#uploadProgress').textContent = `📤 بارگذاری ${customName}...`;
      try{ const up = await uploadAttachment(file, customName); attachments.push({ name: customName, fileId: up.id, link: up.webViewLink }); }catch(e){ console.error(e); }
    }
    const letter = { id:'l_'+Date.now(), number:nextNum, projectId, title, date, sender, recipient, summary: overlay.querySelector('#lSummary').value.trim(), attachments, createdBy: currentUser.email, createdAt: new Date().toISOString() };
    db.letters.push(letter);
    db.nextLetterNumber++;
    overlay.remove();
    await saveDatabase();
    renderProject(projectId);
  };
}
