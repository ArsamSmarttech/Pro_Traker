<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سامانه مدیریت پروژه</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Vazirmatn',sans-serif;background:#F4F5F7;min-height:100vh;}
  .hidden{display:none !important;}
  
  #loginScreen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(145deg, #1A2A3A 0%, #0F1A28 100%);
    color: #fff;
    text-align: center;
    padding: 24px;
  }
  
  #loginScreen h1 { font-size: 28px; margin-bottom: 10px; }
  #loginScreen p { color: #B0BCCA; margin-bottom: 30px; max-width: 400px; }
  
  #googleLoginBtn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: #fff;
    color: #1C1F26;
    border: none;
    padding: 14px 32px;
    border-radius: 40px;
    font-family: 'Vazirmatn', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  #googleLoginBtn:hover { transform: translateY(-2px); }
  #googleLoginBtn img { width: 24px; height: 24px; }
  #loginError { color: #FFB5AD; margin-top: 16px; font-size: 14px; background: rgba(255,0,0,0.1); padding: 10px 20px; border-radius: 8px; display: none; }
  #debugInfo { color: #8898B0; font-size: 12px; margin-top: 16px; max-width: 500px; word-break: break-all; }
  
  /* بقیه استایل‌ها مثل قبل */
  #app { display: flex; min-height: 100vh; }
  aside { width: 280px; background: #1A2A3A; color: #fff; padding: 24px 18px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  aside .brand { font-weight: 800; font-size: 20px; }
  aside .brand small { display: block; font-weight: 400; font-size: 12px; color: #8898B0; margin-top: 4px; }
  aside .userline { margin: 20px 0 16px; padding: 12px 14px; background: rgba(255,255,255,.06); border-radius: 10px; font-size: 13px; }
  aside .userline .name { font-weight: 600; }
  aside .userline .mail { color: #8898B0; font-size: 11px; }
  #newProjectBtn { background: #D4872E; color: #fff; border: none; padding: 12px 16px; border-radius: 10px; font-family: inherit; font-weight: 700; cursor: pointer; font-size: 14px; margin-bottom: 18px; width: 100%; }
  #projectList { overflow-y: auto; flex: 1; }
  .proj-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 2px; }
  .proj-item:hover { background: rgba(255,255,255,.07); }
  .proj-item.active { background: rgba(255,255,255,.12); }
  .proj-num { font-size: 10px; font-weight: 700; color: #D4872E; background: rgba(255,255,255,.08); padding: 2px 8px; border-radius: 4px; }
  .proj-name { font-size: 13.5px; font-weight: 500; flex: 1; }
  #signOutBtn { margin-top: 10px; background: transparent; border: 1px solid rgba(255,255,255,.12); color: #9AABBF; padding: 10px; border-radius: 8px; font-family: inherit; cursor: pointer; font-size: 13px; width: 100%; }
  main { flex: 1; padding: 32px 40px; overflow-y: auto; background: #F4F5F7; }
  .btn { background: #1A2A3A; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; font-family: inherit; font-weight: 600; cursor: pointer; font-size: 13px; }
  .btn.accent { background: #D4872E; }
  .btn.secondary { background: #fff; color: #1A2A3A; border: 1px solid #E2E5EA; }
  .btn.small { padding: 6px 12px; font-size: 11px; }
  .project-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; flex-wrap: wrap; gap: 14px; background: #fff; padding: 20px 24px; border-radius: 12px; border: 1px solid #E2E5EA; }
  .project-header .file-tag { display: inline-block; font-size: 11px; font-weight: 700; color: #D4872E; background: #FDF1E0; padding: 3px 12px; border-radius: 50px; }
  .project-header h2 { margin: 4px 0; font-size: 22px; }
  .tabs { display: flex; gap: 4px; background: #fff; border-radius: 12px; padding: 4px; border: 1px solid #E2E5EA; margin-bottom: 24px; }
  .tab { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; border: none; background: transparent; font-family: inherit; color: #6B7280; }
  .tab.active { background: #1A2A3A; color: #fff; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .empty-state { text-align: center; color: #6B7280; margin-top: 100px; font-size: 15px; }
  .empty-state b { display: block; font-size: 21px; color: #1C1F26; margin-bottom: 8px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(10,14,26,.65); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 50; }
  .modal { background: #fff; border-radius: 14px; padding: 28px 30px 24px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; }
  .modal h3 { margin: 0 0 18px; font-size: 19px; font-weight: 800; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .field input, .field textarea { width: 100%; padding: 10px 12px; border: 1px solid #E2E5EA; border-radius: 8px; font-family: inherit; font-size: 14px; }
  .field textarea { resize: vertical; min-height: 70px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; padding-top: 14px; border-top: 1px solid #E2E5EA; }
</style>
</head>
<body>

<!-- ===================== صفحه ورود ===================== -->
<div id="loginScreen">
  <h1>📁 سامانه مدیریت پروژه</h1>
  <p>برای دسترسی به سامانه، با حساب گوگل خود وارد شوید.</p>
  
  <button id="googleLoginBtn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    ورود با گوگل
  </button>
  
  <div id="loginError"></div>
  <div id="debugInfo"></div>
</div>

<!-- ===================== برنامه اصلی ===================== -->
<div id="app" class="hidden">
  <aside>
    <div class="brand">📁 پرونده‌های پروژه<small>مدیریت پروژه، جلسات و نامه‌ها</small></div>
    <div class="userline">
      <div class="name" id="userName"></div>
      <div class="mail" id="userMail"></div>
    </div>
    <button id="newProjectBtn">➕ پروژه جدید</button>
    <div id="projectList"></div>
    <button id="signOutBtn">🚪 خروج از حساب</button>
  </aside>
  <main>
    <div id="syncStatus" style="font-size:12px;color:#6B7280;margin-bottom:18px;display:flex;align-items:center;gap:8px;background:#fff;padding:8px 16px;border-radius:8px;border:1px solid #E2E5EA;">
      <span style="width:8px;height:8px;border-radius:50%;background:#bbb;display:inline-block;"></span>
      <span id="syncText">آماده</span>
    </div>
    <div id="mainContent"></div>
  </main>
</div>

<!-- ===================== محل قرارگیری مودال‌ها ===================== -->
<div id="modalRoot"></div>

<script>
// ================================================================
// تنظیمات
// ================================================================
const CONFIG = {
  CLIENT_ID: "1094486513329-4rgt63dvl9d3oqfbhe7pad3uv2s130ca.apps.googleusercontent.com",
  DRIVE_FOLDER_ID: "https://drive.google.com/drive/folders/1Fp69nrlgchqVpxdP3LsPEMaZjDAp3elC?dmr=1&ec=wgc-drive-%5Bmodule%5D-goto",
  DB_FILENAME: "pms-database.json",
  ALLOWED_EMAILS: [
    // ایمیل گوگل دقیق هر کاربر مجاز را اینجا اضافه کنید (حداکثر حدود ۱۵ نفر)
    "Applyforfund@gmail.com",
    "Arsam.Smarttech@gmail.com"
    "koroush.gheisari@gmail.com"
  ],
  SCOPES: "https://www.googleapis.com/auth/drive"
};

// ================================================================
// متغیرها
// ================================================================
let accessToken = null;
let currentUser = null;
let db = { nextProjectNumber: 1, nextLetterNumber: 1, projects: [], meetings: [], letters: [] };
let dbFileId = null;
let activeProjectId = null;
let tokenClient = null;

// ================================================================
// توابع کمکی
// ================================================================
const $ = (sel) => document.querySelector(sel);
const el = (tag, cls, html) => { const e = document.createElement(tag); if (cls) e.className = cls; if (html !== undefined) e.innerHTML = html; return e; };

function showLoginError(msg) {
  const errEl = document.getElementById('loginError');
  errEl.textContent = msg;
  errEl.style.display = 'block';
}

function showDebug(msg) {
  document.getElementById('debugInfo').textContent = msg;
  console.log('🔍 Debug:', msg);
}

function escapeHtml(str) {
  return String(str || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function formatDate(d) {
  try { return new Date(d).toLocaleDateString('fa-IR', { year: 'numeric', month: 'long', day: 'numeric' }); } catch (e) { return d; }
}

// ================================================================
// راه‌اندازی - با نمایش وضعیت در صفحه
// ================================================================
window.onload = function() {
  showDebug('✅ صفحه بارگذاری شد - در حال آماده‌سازی...');
  console.log('✅ صفحه بارگذاری شد');
  
  const loginBtn = document.getElementById('googleLoginBtn');
  
  // بررسی اینکه دکمه وجود دارد
  if (loginBtn) {
    showDebug('✅ دکمه ورود پیدا شد');
    console.log('✅ دکمه ورود پیدا شد');
  } else {
    showDebug('❌ دکمه ورود پیدا نشد!');
    console.error('❌ دکمه ورود پیدا نشد');
    return;
  }
  
  // بررسی کتابخانه گوگل
  if (typeof google !== 'undefined' && google.accounts) {
    showDebug('✅ کتابخانه گوگل بارگذاری شد');
    console.log('✅ Google Accounts loaded');
  } else {
    showDebug('⏳ در انتظار بارگذاری کتابخانه گوگل...');
    console.log('⏳ Waiting for Google library...');
  }
  
  loginBtn.addEventListener('click', function() {
    showDebug('🔄 دکمه ورود کلیک شد - درخواست ورود...');
    console.log('🔄 دکمه ورود کلیک شد');
    this.disabled = true;
    this.innerHTML = '⏳ در حال اتصال...';
    
    try {
      // بررسی اینکه کتابخانه گوگل موجود است
      if (typeof google === 'undefined' || !google.accounts) {
        showDebug('❌ کتابخانه گوگل بارگذاری نشده! لطفاً صفحه را رفرش کنید.');
        this.disabled = false;
        this.innerHTML = 'ورود با گوگل';
        return;
      }
      
      showDebug('✅ راه‌اندازی Google Identity...');
      
      google.accounts.id.initialize({
        client_id: CONFIG.CLIENT_ID,
        callback: handleIdToken,
        cancel_on_tap_outside: false
      });
      
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CONFIG.CLIENT_ID,
        scope: CONFIG.SCOPES,
        callback: (resp) => {
          if (resp.error) {
            showDebug('❌ خطا: ' + resp.error);
            showLoginError("دسترسی به گوگل‌درایو رد شد.");
            enableLoginButton();
            return;
          }
          accessToken = resp.access_token;
          showDebug('✅ توکن دریافت شد - ورود موفق');
          bootApp();
        }
      });
      
      showDebug('📱 نمایش پنجره انتخاب حساب...');
      google.accounts.id.prompt();
      
    } catch(e) {
      showDebug('❌ خطا: ' + e.message);
      console.error('❌ Error:', e);
      showLoginError('خطا: ' + e.message);
      enableLoginButton();
    }
  });
  
  showDebug('✅ آماده - روی دکمه ورود کلیک کنید');
};

function enableLoginButton() {
  const btn = document.getElementById('googleLoginBtn');
  btn.disabled = false;
  btn.innerHTML = `
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    ورود با گوگل
  `;
}

// ================================================================
// مدیریت پاسخ ورود
// ================================================================
function handleIdToken(response) {
  showDebug('🔄 دریافت پاسخ از گوگل...');
  console.log('🔄 دریافت پاسخ از گوگل');
  try {
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    const email = (payload.email || '').toLowerCase();
    showDebug('📧 ایمیل: ' + email);
    console.log('📧 ایمیل:', email);
    
    if (!CONFIG.ALLOWED_EMAILS.map(e => e.toLowerCase()).includes(email)) {
      showDebug('❌ ایمیل مجاز نیست');
      showLoginError("❌ این ایمیل در فهرست کاربران مجاز نیست.");
      enableLoginButton();
      return;
    }
    
    currentUser = { name: payload.name, email: payload.email };
    showDebug('✅ کاربر معتبر: ' + currentUser.name);
    console.log('✅ کاربر معتبر:', currentUser.name);
    tokenClient.requestAccessToken({ prompt: '' });
    
  } catch(e) {
    showDebug('❌ خطا: ' + e.message);
    console.error('❌ Error:', e);
    showLoginError('خطا در پردازش اطلاعات ورود.');
    enableLoginButton();
  }
}

// ================================================================
// راه‌اندازی برنامه بعد از ورود
// ================================================================
async function bootApp() {
  showDebug('🚀 راه‌اندازی برنامه...');
  console.log('🚀 راه‌اندازی برنامه...');
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('userName').textContent = currentUser.name;
  document.getElementById('userMail').textContent = currentUser.email;
  document.getElementById('signOutBtn').onclick = () => location.reload();
  document.getElementById('newProjectBtn').onclick = openNewProjectModal;
  
  await loadDatabase();
  renderProjectList();
  renderEmpty();
}

// ================================================================
// توابع گوگل درایو (خلاصه شده)
// ================================================================
async function driveFetch(url, options = {}) {
  options.headers = Object.assign({}, options.headers, { 'Authorization': 'Bearer ' + accessToken });
  const res = await fetch(url, options);
  if (!res.ok) throw new Error('Drive API error: ' + res.status);
  return res;
}

async function loadDatabase() {
  try {
    const q = encodeURIComponent(`name='${CONFIG.DB_FILENAME}' and '${CONFIG.DRIVE_FOLDER_ID}' in parents and trashed=false`);
    const listRes = await driveFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`);
    const listData = await listRes.json();
    
    if (listData.files && listData.files.length > 0) {
      dbFileId = listData.files[0].id;
      const fileRes = await driveFetch(`https://www.googleapis.com/drive/v3/files/${dbFileId}?alt=media`);
      db = await fileRes.json();
    } else {
      dbFileId = await createDbFile();
    }
    showDebug('✅ دیتابیس بارگذاری شد');
  } catch(e) {
    showDebug('❌ خطا در بارگذاری دیتابیس: ' + e.message);
    console.error(e);
  }
}

async function createDbFile() {
  const metadata = { name: CONFIG.DB_FILENAME, parents: [CONFIG.DRIVE_FOLDER_ID], mimeType: 'application/json' };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
  form.append('file', new Blob([JSON.stringify(db)], { type: 'application/json' }));
  const res = await driveFetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', { method: 'POST', body: form });
  const data = await res.json();
  return data.id;
}

async function saveDatabase() {
  await driveFetch(`https://www.googleapis.com/upload/drive/v3/files/${dbFileId}?uploadType=media`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(db)
  });
}

// ================================================================
// توابع مدیریت پروژه‌ها (خلاصه شده)
// ================================================================
function renderProjectList() {
  const wrap = document.getElementById('projectList');
  wrap.innerHTML = '';
  db.projects.slice().sort((a, b) => a.number - b.number).forEach(p => {
    const item = el('div', 'proj-item' + (p.id === activeProjectId ? ' active' : ''));
    item.innerHTML = `
      <span class="proj-num">#${p.number}</span>
      <span class="proj-name">${escapeHtml(p.name)}</span>
      <button class="proj-delete" style="background:transparent;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:14px;">✕</button>
    `;
    item.onclick = (e) => {
      if (e.target.classList.contains('proj-delete')) return;
      activeProjectId = p.id;
      renderProjectList();
      renderProject(p.id);
    };
    item.querySelector('.proj-delete').onclick = async (e) => {
      e.stopPropagation();
      if (!confirm(`حذف پروژه "${p.name}"؟`)) return;
      db.projects = db.projects.filter(pr => pr.id !== p.id);
      db.meetings = db.meetings.filter(m => m.projectId !== p.id);
      db.letters = db.letters.filter(l => l.projectId !== p.id);
      if (activeProjectId === p.id) { activeProjectId = null; renderEmpty(); }
      await saveDatabase();
      renderProjectList();
    };
    wrap.appendChild(item);
  });
}

function renderEmpty() {
  document.getElementById('mainContent').innerHTML = `<div class="empty-state"><b>📂 هیچ پروژه‌ای انتخاب نشده</b>از فهرست سمت راست یک پروژه را انتخاب کنید.</div>`;
}

function openNewProjectModal() {
  const overlay = el('div', 'modal-overlay');
  overlay.innerHTML = `
    <div class="modal">
      <h3>📄 پروژه جدید — شماره #${db.nextProjectNumber}</h3>
      <div class="field"><label>نام پروژه</label><input type="text" id="npName" placeholder="نام پروژه را وارد کنید"></div>
      <div class="field"><label>توضیح (اختیاری)</label><textarea id="npDesc" placeholder="توضیحات پروژه..."></textarea></div>
      <div class="modal-actions">
        <button class="btn secondary" id="npCancel">انصراف</button>
        <button class="btn" id="npSave">ثبت پروژه</button>
      </div>
    </div>
  `;
  document.getElementById('modalRoot').appendChild(overlay);
  overlay.querySelector('#npCancel').onclick = () => overlay.remove();
  overlay.querySelector('#npSave').onclick = async () => {
    const name = overlay.querySelector('#npName').value.trim();
    if (!name) { alert('لطفاً نام پروژه را وارد کنید.'); return; }
    const proj = { id: 'p_' + Date.now(), number: db.nextProjectNumber, name: name, description: overlay.querySelector('#npDesc').value.trim(), createdBy: currentUser.email, createdAt: new Date().toISOString() };
    db.projects.push(proj);
    db.nextProjectNumber++;
    overlay.remove();
    await saveDatabase();
    renderProjectList();
    activeProjectId = proj.id;
    renderProjectList();
    renderProject(proj.id);
  };
}

function renderProject(projectId) {
  const p = db.projects.find(x => x.id === projectId);
  if (!p) { renderEmpty(); return; }
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="project-header">
      <div>
        <div class="file-tag">پرونده شماره #${p.number}</div>
        <h2>${escapeHtml(p.name)}</h2>
        ${p.description ? `<div class="desc" style="color:#6B7280;font-size:14px;">${escapeHtml(p.description)}</div>` : ''}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn accent" id="newMeetingBtn">➕ جلسه جدید</button>
        <button class="btn" id="newLetterBtn">✉️ نامه جدید</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="meetings">📋 جلسات</button>
      <button class="tab" data-tab="letters">✉️ نامه‌ها</button>
    </div>
    <div id="tab-meetings" class="tab-content active"><div id="meetingList">در حال بارگذاری...</div></div>
    <div id="tab-letters" class="tab-content"><div id="letterList">در حال بارگذاری...</div></div>
  `;
  document.getElementById('newMeetingBtn').onclick = () => openNewMeetingModal(projectId);
  document.getElementById('newLetterBtn').onclick = () => openNewLetterModal(projectId);
  renderMeetings(projectId);
  renderLetters(projectId);
}

// ================================================================
// توابع جلسات و نامه‌ها (ساده شده)
// ================================================================
function renderMeetings(projectId) {
  const meetings = db.meetings.filter(m => m.projectId === projectId);
  const wrap = document.getElementById('meetingList');
  if (meetings.length === 0) { wrap.innerHTML = '<div class="empty-state" style="margin-top:40px;"><b>📋 هنوز جلسه‌ای ثبت نشده</b></div>'; return; }
  wrap.innerHTML = meetings.map(m => `
    <div style="background:#fff;border:1px solid #E2E5EA;border-radius:12px;padding:16px 20px;margin-bottom:14px;">
      <div style="font-size:12px;color:#D4872E;font-weight:700;">📅 ${formatDate(m.date)}</div>
      <div style="font-size:17px;font-weight:700;margin:4px 0;">${escapeHtml(m.title)}</div>
      <div style="font-size:14px;line-height:1.8;background:#FAFBFC;padding:10px 14px;border-radius:8px;">${escapeHtml(m.summary)}</div>
    </div>
  `).join('');
}

function renderLetters(projectId) {
  const letters = db.letters.filter(l => l.projectId === projectId);
  const wrap = document.getElementById('letterList');
  if (letters.length === 0) { wrap.innerHTML = '<div class="empty-state" style="margin-top:40px;"><b>✉️ هنوز نامه‌ای ثبت نشده</b></div>'; return; }
  wrap.innerHTML = letters.map(l => `
    <div style="background:#fff;border:1px solid #E2E5EA;border-radius:12px;padding:16px 20px;margin-bottom:14px;border-right:4px solid #D4872E;">
      <div><span style="font-size:12px;font-weight:700;color:#D4872E;background:#FDF1E0;padding:3px 12px;border-radius:50px;">✉️ شماره: ${l.number}</span></div>
      <div style="font-size:16px;font-weight:700;margin:4px 0;">${escapeHtml(l.title)}</div>
      <div style="font-size:12px;color:#6B7280;">${formatDate(l.date)} · ${escapeHtml(l.sender)} → ${escapeHtml(l.recipient)}</div>
    </div>
  `).join('');
}

function openNewMeetingModal(projectId) {
  const overlay = el('div', 'modal-overlay');
  overlay.innerHTML = `
    <div class="modal">
      <h3>📝 ثبت جلسه جدید</h3>
      <div class="field"><label>عنوان</label><input type="text" id="mTitle"></div>
      <div class="field"><label>تاریخ</label><input type="date" id="mDate" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="field"><label>خلاصه</label><textarea id="mSummary"></textarea></div>
      <div class="modal-actions">
        <button class="btn secondary" id="mCancel">انصراف</button>
        <button class="btn" id="mSave">ثبت</button>
      </div>
    </div>
  `;
  document.getElementById('modalRoot').appendChild(overlay);
  overlay.querySelector('#mCancel').onclick = () => overlay.remove();
  overlay.querySelector('#mSave').onclick = async () => {
    const title = overlay.querySelector('#mTitle').value.trim();
    const date = overlay.querySelector('#mDate').value;
    const summary = overlay.querySelector('#mSummary').value.trim();
    if (!title || !date || !summary) { alert('لطفاً تمام فیلدها را پر کنید.'); return; }
    db.meetings.push({ id: 'm_' + Date.now(), projectId, title, date, summary, followUps: [], attachments: [], comments: [], createdBy: currentUser.email, createdAt: new Date().toISOString() });
    overlay.remove();
    await saveDatabase();
    renderProject(projectId);
  };
}

function openNewLetterModal(projectId) {
  const overlay = el('div', 'modal-overlay');
  const nextNum = db.nextLetterNumber;
  overlay.innerHTML = `
    <div class="modal">
      <h3>✉️ ثبت نامه جدید — شماره: ${nextNum}</h3>
      <div class="field"><label>عنوان</label><input type="text" id="lTitle"></div>
      <div class="field"><label>تاریخ</label><input type="date" id="lDate" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="field"><label>فرستنده</label><input type="text" id="lSender"></div>
      <div class="field"><label>گیرنده</label><input type="text" id="lRecipient"></div>
      <div class="modal-actions">
        <button class="btn secondary" id="lCancel">انصراف</button>
        <button class="btn" id="lSave">ثبت</button>
      </div>
    </div>
  `;
  document.getElementById('modalRoot').appendChild(overlay);
  overlay.querySelector('#lCancel').onclick = () => overlay.remove();
  overlay.querySelector('#lSave').onclick = async () => {
    const title = overlay.querySelector('#lTitle').value.trim();
    const date = overlay.querySelector('#lDate').value;
    const sender = overlay.querySelector('#lSender').value.trim();
    const recipient = overlay.querySelector('#lRecipient').value.trim();
    if (!title || !date || !sender || !recipient) { alert('لطفاً تمام فیلدها را پر کنید.'); return; }
    db.letters.push({ id: 'l_' + Date.now(), number: nextNum, projectId, title, date, sender, recipient, summary: '', attachments: [], createdBy: currentUser.email, createdAt: new Date().toISOString() });
    db.nextLetterNumber++;
    overlay.remove();
    await saveDatabase();
    renderProject(projectId);
  };
}
</script>
</body>
</html>
